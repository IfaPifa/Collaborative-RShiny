name: Build Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/collaborative-rshiny

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Kafka architecture
          - context: Thesis-Project-Final-Kafka/angular_frontend
            image: kafka-angular-frontend
          - context: Thesis-Project-Final-Kafka/shinyswarm
            image: kafka-spring-backend
          - context: Thesis-Project-Final-Kafka/shiny_services
            image: kafka-shiny-services

          # REST API architecture
          - context: Thesis-Project-Final-RESTAPI/angular_frontend
            image: rest-angular-frontend
          - context: Thesis-Project-Final-RESTAPI/shinyswarm
            image: rest-spring-backend
          - context: Thesis-Project-Final-RESTAPI/shiny_services
            image: rest-shiny-services

          # Monolithic architecture
          - context: whole_apps
            image: monolithic-shiny

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
