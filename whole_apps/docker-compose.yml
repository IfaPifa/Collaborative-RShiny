# =============================================================================
# ShinySwarm - Monolithic Architecture
# Each app is a standalone Shiny process. No Spring Boot, Redis, or Kafka.
# =============================================================================

x-shiny-base: &shiny-base
  build:
    context: .
    dockerfile: Dockerfile
  image: shinyswarm/mono-r:latest
  restart: unless-stopped
  networks:
    - monolithic

services:

  # --- APP 1: Calculator ---
  mono-calculator:
    <<: *shiny-base
    container_name: mono_calculator
    volumes:
      - ./calculator/app.r:/srv/shiny-server/app.r

  # --- APP 2: Visual Analytics ---
  mono-analytics:
    <<: *shiny-base
    container_name: mono_analytics
    volumes:
      - ./analytics/app.r:/srv/shiny-server/app.r

  # --- APP 3: Data Exchange ---
  mono-data-exchange:
    <<: *shiny-base
    container_name: mono_data_exchange
    volumes:
      - ./data_exchange/app.r:/srv/shiny-server/app.r

  # --- APP 4: Monte Carlo Simulator ---
  mono-montecarlo:
    <<: *shiny-base
    container_name: mono_montecarlo
    volumes:
      - ./montecarlo/app.r:/srv/shiny-server/app.r

  # --- APP 5: Geospatial Map ---
  mono-map:
    <<: *shiny-base
    container_name: mono_map
    volumes:
      - ./map/app.r:/srv/shiny-server/app.r

  # --- APP 6: Climate Anomaly Detector ---
  mono-anomaly-detector:
    <<: *shiny-base
    container_name: mono_anomaly_detector
    volumes:
      - ./anomaly_detector/app.r:/srv/shiny-server/app.r

  # --- APP 7: Advanced Visual Analytics ---
  mono-analytics-advanced:
    <<: *shiny-base
    container_name: mono_analytics_advanced
    volumes:
      - ./analytics_advanced/app.r:/srv/shiny-server/app.r

  # --- APP 8: ML Trainer ---
  mono-ml-trainer:
    <<: *shiny-base
    container_name: mono_ml_trainer
    volumes:
      - ./ml_trainer/app.r:/srv/shiny-server/app.r

  # --- NGINX REVERSE PROXY ---
  nginx:
    image: nginx:alpine
    container_name: mono_nginx
    restart: unless-stopped
    ports:
      - "7080:80"
      - "7081:81"
      - "7082:82"
      - "7083:83"
      - "7084:84"
      - "7086:85"
      - "7087:87"
      - "7088:88"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mono-calculator
      - mono-analytics
      - mono-data-exchange
      - mono-montecarlo
      - mono-map
      - mono-anomaly-detector
      - mono-analytics-advanced
      - mono-ml-trainer
    networks:
      - monolithic

networks:
  monolithic:
    driver: bridge
