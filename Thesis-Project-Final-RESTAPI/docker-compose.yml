# =============================================================================
# ShinySwarm - Full Stack (REST API Architecture)
# Build-once R image via YAML anchor: x-shiny-base
# Run from inside: Thesis - Project - Final - RESTAPI /
# =============================================================================

x-shiny-base: &shiny-base
  build:
    context: ./shiny_services
    dockerfile: Dockerfile
  image: shinyswarm/r-worker:latest
  restart: unless-stopped

services:
  # --- INFRASTRUCTURE ---
  redis_cache:
    image: redis:alpine
    container_name: redis_cache
    ports:
      - "6379:6379"

  db:
    container_name: postgres_db
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shinyswarm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- JAVA BACKEND ---
  backend:
    container_name: spring_backend
    build: ./shinyswarm
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/shinyswarm
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      APP_JWT_SECRET: IxNDf6ATTN2WPPjo8KnG6pe7wrduNFi3TRTnDWkcZtI=
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
    depends_on:
      - db
      - redis_cache

  # --- ANGULAR FRONTEND ---
  frontend:
    container_name: angular_frontend
    build: ./angular_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

  # --- NGINX REVERSE PROXY ---
  nginx_proxy:
    container_name: nginx_proxy
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
      - "8081:81"
      - "8082:82"
      - "8083:83"
      - "8084:84"
      - "8086:85"
      - "8087:87"
      - "8088:88"
    volumes:
      - ./shiny_services/nginx.conf:/etc/nginx/nginx.conf:ro

  # --- APP 1: CALCULATOR ---
  shiny_front:
    <<: *shiny-base
    container_name: shiny_front
    volumes:
      - ./shiny_services/calculator/shiny_front.r:/app/app.R
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"

  shiny_back:
    <<: *shiny-base
    container_name: shiny_back
    volumes:
      - ./shiny_services/calculator/shiny_back.r:/app/back.R
    command: R -e "pr <- plumber::plumb('/app/back.R'); pr$$run(host='0.0.0.0', port=8000)"

  # --- APP 2: VISUAL ANALYTICS ---
  shiny_front_analytics:
    <<: *shiny-base
    container_name: shiny_front_analytics
    volumes:
      - ./shiny_services/visual_analytics/shiny_front_analytics.r:/app/app.R
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"

  shiny_back_analytics:
    <<: *shiny-base
    container_name: shiny_back_analytics
    volumes:
      - ./shiny_services/visual_analytics/shiny_back_analytics.r:/app/back.R
    command: Rscript /app/back.R

  # --- APP 3: DATA EXCHANGE (CSV) ---
  shiny_front_csv:
    <<: *shiny-base
    container_name: shiny_front_csv
    volumes:
      - ./shiny_services/data_exchange/shiny_front_csv.r:/app/app.R
      - shared_data:/app/shared_data
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"

  shiny_back_csv:
    <<: *shiny-base
    container_name: shiny_back_csv
    volumes:
      - ./shiny_services/data_exchange/shiny_back_csv.r:/app/back.R
      - shared_data:/app/shared_data
    command: Rscript /app/back.R

  # --- APP 4: MONTE CARLO SIMULATOR ---
  shiny_front_mc:
    <<: *shiny-base
    container_name: shiny_front_mc
    volumes:
      - ./shiny_services/monte_carlo/shiny_front_mc.r:/app/app.R
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"

  shiny_back_mc:
    <<: *shiny-base
    container_name: shiny_back_mc
    volumes:
      - ./shiny_services/monte_carlo/shiny_back_mc.r:/app/back.R
    command: Rscript /app/back.R

  # --- APP 5: GEOSPATIAL EDITOR (MAP) ---
  shiny_front_map:
    <<: *shiny-base
    container_name: shiny_front_map
    volumes:
      - ./shiny_services/map/shiny_front_map.r:/app/app.R
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"

  shiny_back_map:
    <<: *shiny-base
    container_name: shiny_back_map
    volumes:
      - ./shiny_services/map/shiny_back_map.r:/app/back.R
    command: Rscript /app/back.R

  # --- APP 6: LTER-LIFE ANOMALY DETECTOR (CSV ADVANCED) ---
  shiny_front_csv_advanced:
    <<: *shiny-base
    container_name: shiny_front_csv_advanced
    volumes:
      - ./shiny_services/data_exchange/shiny_front_csv_advanced.r:/app/app.R
      - shared_data:/app/shared_data
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"

  shiny_back_csv_advanced:
    <<: *shiny-base
    container_name: shiny_back_csv_advanced
    volumes:
      - ./shiny_services/data_exchange/shiny_back_csv_advanced.r:/app/back.R
      - shared_data:/app/shared_data
    command: Rscript /app/back.R

  # --- APP 7: ADVANCED VISUAL ANALYTICS ---
  shiny_front_analytics_advanced:
    <<: *shiny-base
    container_name: shiny_front_analytics_advanced
    volumes:
      - ./shiny_services/visual_analytics/shiny_front_analytics_advanced.r:/app/app.R
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"

  shiny_back_analytics_advanced:
    <<: *shiny-base
    container_name: shiny_back_analytics_advanced
    volumes:
      - ./shiny_services/visual_analytics/shiny_back_analytics_advanced.r:/app/back.R
    command: Rscript /app/back.R

  # --- APP 8: ML TRAINER ---
  shiny_front_ml:
    <<: *shiny-base
    container_name: shiny_front_ml
    volumes:
      - ./shiny_services/machine_learning/shiny_front_ml.r:/app/app.R
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"

  shiny_back_ml:
    <<: *shiny-base
    container_name: shiny_back_ml
    volumes:
      - ./shiny_services/machine_learning/shiny_back_ml.r:/app/back.R
    command: Rscript /app/back.R

volumes:
  postgres_data:
  shared_data: