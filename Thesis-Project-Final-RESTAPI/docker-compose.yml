# =============================================================================
# ShinySwarm - Full Stack (REST API Architecture)
# No Kafka. All R backends run as Plumber APIs.
# Build-once R image via YAML anchor: x-shiny-base
# =============================================================================

x-shiny-base: &shiny-base
  build:
    context: ./shiny_services
    dockerfile: Dockerfile
  image: shinyswarm/r-worker:latest
  restart: unless-stopped
  networks:
    - shinyswarm

services:
  # --- INFRASTRUCTURE ---
  redis-cache:
    image: redis:alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    networks:
      - shinyswarm

  db:
    container_name: postgres-db
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shinyswarm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shinyswarm

  # --- JAVA BACKEND ---
  spring-backend:
    container_name: spring-backend
    build: ./shinyswarm
    image: shinyswarm/spring-backend:latest
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/shinyswarm
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      APP_JWT_SECRET: IxNDf6ATTN2WPPjo8KnG6pe7wrduNFi3TRTnDWkcZtI=
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - db
      - redis-cache
    networks:
      - shinyswarm

  # --- ANGULAR FRONTEND ---
  angular-frontend:
    container_name: angular-frontend
    build: ./angular_frontend
    image: shinyswarm/angular-frontend:latest
    ports:
      - "4200:80"
    depends_on:
      - spring-backend
    networks:
      - shinyswarm

  # --- NGINX REVERSE PROXY ---
  nginx-proxy:
    container_name: nginx-proxy
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - shiny-front
      - shiny-front-analytics
      - shiny-front-analytics-advanced
      - shiny-front-csv
      - shiny-front-csv-advanced
      - shiny-front-mc
      - shiny-front-map
      - shiny-front-ml
    ports:
      - "8080:80"
      - "8081:81"
      - "8082:82"
      - "8083:83"
      - "8084:84"
      - "8086:85"
      - "8087:87"
      - "8088:88"
    volumes:
      - ./shiny_services/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - shinyswarm

  # =============================================
  # APP 1: CALCULATOR
  # =============================================
  shiny-front:
    <<: *shiny-base
    container_name: shiny-front
    volumes:
      - ./shiny_services/calculator/shiny_front.r:/app/app.R
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"

  shiny-back:
    <<: *shiny-base
    container_name: shiny-back
    ports:                  # <--- ADD THIS
      - "8000:8000"
    volumes:
      - ./shiny_services/calculator/shiny_back.r:/app/back.R
    command: R -e "pr <- plumber::plumb('/app/back.R'); pr$$run(host='0.0.0.0', port=8000)"

  # =============================================
  # APP 2: VISUAL ANALYTICS
  # =============================================
  shiny-front-analytics:
    <<: *shiny-base
    container_name: shiny-front-analytics
    volumes:
      - ./shiny_services/visual_analytics/shiny_front_analytics.r:/app/app.R
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"

  shiny-back-analytics:
    <<: *shiny-base
    container_name: shiny-back-analytics
    volumes:
      - ./shiny_services/visual_analytics/shiny_back_analytics.r:/app/back.R
    command: R -e "pr <- plumber::plumb('/app/back.R'); pr$$run(host='0.0.0.0', port=8000)"

  # =============================================
  # APP 3: ADVANCED VISUAL ANALYTICS
  # =============================================
  shiny-front-analytics-advanced:
    <<: *shiny-base
    container_name: shiny-front-analytics-advanced
    volumes:
      - ./shiny_services/visual_analytics/shiny_front_analytics_advanced.r:/app/app.R
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"

  shiny-back-analytics-advanced:
    <<: *shiny-base
    container_name: shiny-back-analytics-advanced
    volumes:
      - ./shiny_services/visual_analytics/shiny_back_analytics_advanced.r:/app/back.R
    command: R -e "pr <- plumber::plumb('/app/back.R'); pr$$run(host='0.0.0.0', port=8000)"

  # =============================================
  # APP 4: DATA EXCHANGE (CSV)
  # =============================================
  shiny-front-csv:
    <<: *shiny-base
    container_name: shiny-front-csv
    volumes:
      - ./shiny_services/data_exchange/shiny_front_csv.r:/app/app.R
      - shared_data:/app/shared_data
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"

  shiny-back-csv:
    <<: *shiny-base
    container_name: shiny-back-csv
    volumes:
      - ./shiny_services/data_exchange/shiny_back_csv.r:/app/back.R
      - shared_data:/app/shared_data
    command: R -e "pr <- plumber::plumb('/app/back.R'); pr$$run(host='0.0.0.0', port=8000)"

  # =============================================
  # APP 5: MONTE CARLO SIMULATOR
  # =============================================
  shiny-front-mc:
    <<: *shiny-base
    container_name: shiny-front-mc
    volumes:
      - ./shiny_services/monte_carlo/shiny_front_mc.r:/app/app.R
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"

  shiny-back-mc:
    <<: *shiny-base
    container_name: shiny-back-mc
    volumes:
      - ./shiny_services/monte_carlo/shiny_back_mc.r:/app/back.R
    command: R -e "pr <- plumber::plumb('/app/back.R'); pr$$run(host='0.0.0.0', port=8000)"

  # =============================================
  # APP 6: GEOSPATIAL EDITOR (MAP)
  # =============================================
  shiny-front-map:
    <<: *shiny-base
    container_name: shiny-front-map
    volumes:
      - ./shiny_services/map/shiny_front_map.r:/app/app.R
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"

  shiny-back-map:
    <<: *shiny-base
    container_name: shiny-back-map
    volumes:
      - ./shiny_services/map/shiny_back_map.r:/app/back.R
    command: R -e "pr <- plumber::plumb('/app/back.R'); pr$$run(host='0.0.0.0', port=8000)"

  # =============================================
  # APP 7: CLIMATE ANOMALY DETECTOR (CSV ADVANCED)
  # =============================================
  shiny-front-csv-advanced:
    <<: *shiny-base
    container_name: shiny-front-csv-advanced
    volumes:
      - ./shiny_services/data_exchange/shiny_front_csv_advanced.r:/app/app.R
      - shared_data:/app/shared_data
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"

  shiny-back-csv-advanced:
    <<: *shiny-base
    container_name: shiny-back-csv-advanced
    volumes:
      - ./shiny_services/data_exchange/shiny_back_csv_advanced.r:/app/back.R
      - shared_data:/app/shared_data
    command: R -e "pr <- plumber::plumb('/app/back.R'); pr$$run(host='0.0.0.0', port=8000)"

  # =============================================
  # APP 8: ML TRAINER
  # =============================================
  shiny-front-ml:
    <<: *shiny-base
    container_name: shiny-front-ml
    volumes:
      - ./shiny_services/machine_learning/shiny_front_ml.r:/app/app.R
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"

  shiny-back-ml:
    <<: *shiny-base
    container_name: shiny-back-ml
    volumes:
      - ./shiny_services/machine_learning/shiny_back_ml.r:/app/back.R
    command: R -e "pr <- plumber::plumb('/app/back.R'); pr$$run(host='0.0.0.0', port=8000)"

networks:
  shinyswarm:
    driver: bridge

volumes:
  postgres_data:
  shared_data:
