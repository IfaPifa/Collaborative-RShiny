services:
  # --- INFRASTRUCTURE ---
  redis-cache:
    image: redis:alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    networks:
      - testing_default

  db:
    container_name: postgres-db
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shinyswarm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - testing_default

  # --- MESH CORE ---
  backend:
    container_name: spring-backend
    build: ./shinyswarm
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/shinyswarm
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      APP_JWT_SECRET: IxNDf6ATTN2WPPjo8KnG6pe7wrduNFi3TRTnDWkcZtI=
      SPRING_JPA_HIBERNATE_DDL_AUTO: update 
    depends_on:
      - db
      - redis-cache
    networks:
      - testing_default

  frontend:
    container_name: angular-frontend
    build: ./angular_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - testing_default

  nginx-proxy:
    container_name: nginx-proxy
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./shiny_services/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - shiny-front
    networks:
      - testing_default

  # --- APP 1: CALCULATOR (REST ARCHITECTURE) ---
  shiny-front:
    build: 
      context: ./shiny_services
      dockerfile: Dockerfile
    container_name: shiny-front
    volumes:
      - ./shiny_services/calculator/shiny_front.r:/app/app.R
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"
    networks:
      - testing_default

  shiny-back:
    build: 
      context: ./shiny_services
      dockerfile: Dockerfile
    container_name: shiny-back
    volumes:
      - ./shiny_services/calculator/shiny_back.r:/app/back.R
    # FIX: Use $$ to escape the Docker variable interpolation
    command: R -e "pr <- plumber::plumb('/app/back.R'); pr$$run(host='0.0.0.0', port=8000)"
    networks:
      - testing_default

networks:
  testing_default:
    driver: bridge

volumes:
  postgres_data: