# ==========================================
# 1. PERSISTENT STORAGE (PVCs)
# ==========================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data-pvc
spec:
  accessModes: [ "ReadWriteOnce" ]
  resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-data-pvc
spec:
  accessModes: [ "ReadWriteMany" ] # Required so both front and back can read/write CSVs
  resources: { requests: { storage: 2Gi } }

---
# ==========================================
# 2. INFRASTRUCTURE: REDIS & POSTGRES
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata: { name: redis-cache }
spec:
  selector: { matchLabels: { app: redis-cache } }
  template:
    metadata: { labels: { app: redis-cache } }
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports: [ { containerPort: 6379 } ]
---
apiVersion: v1
kind: Service
metadata: { name: redis-cache }
spec: { selector: { app: redis-cache }, ports: [ { port: 6379 } ] }

---
apiVersion: apps/v1
kind: Deployment
metadata: { name: db }
spec:
  selector: { matchLabels: { app: db } }
  template:
    metadata: { labels: { app: db } }
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports: [ { containerPort: 5432 } ]
        env:
        - name: POSTGRES_USER
          value: "user"
        - name: POSTGRES_PASSWORD
          value: "password"
        - name: POSTGRES_DB
          value: "shinyswarm"
        volumeMounts:
        - name: pg-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: pg-data
        persistentVolumeClaim: { claimName: postgres-data-pvc }
---
apiVersion: v1
kind: Service
metadata: { name: db }
spec: { selector: { app: db }, ports: [ { port: 5432 } ] }

---
# ==========================================
# 3. MESH CORE (Spring, Angular, Nginx)
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata: { name: spring-backend }
spec:
  selector: { matchLabels: { app: spring-backend } }
  template:
    metadata: { labels: { app: spring-backend } }
    spec:
      containers:
      - name: backend
        image: YOUR_REGISTRY/spring-backend:latest # <-- REPLACE
        ports: [ { containerPort: 8085 } ]
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://db:5432/shinyswarm"
        - name: SPRING_DATASOURCE_USERNAME
          value: "user"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "password"
        - name: APP_JWT_SECRET
          value: "IxNDf6ATTN2WPPjo8KnG6pe7wrduNFi3TRTnDWkcZtI="
        - name: SPRING_JPA_HIBERNATE_DDL_AUTO
          value: "update"
---
apiVersion: v1
kind: Service
metadata: { name: spring-backend }
spec: { selector: { app: spring-backend }, ports: [ { port: 8085 } ] }

---
apiVersion: apps/v1
kind: Deployment
metadata: { name: angular-frontend }
spec:
  selector: { matchLabels: { app: angular-frontend } }
  template:
    metadata: { labels: { app: angular-frontend } }
    spec:
      containers:
      - name: frontend
        image: YOUR_REGISTRY/angular-frontend:latest # <-- REPLACE
        ports: [ { containerPort: 80 } ]
---
apiVersion: v1
kind: Service
metadata:
  name: angular-frontend
  type: LoadBalancer # Exposes to outside world
spec:
  selector: { app: angular-frontend }
  ports: [ { port: 4200, targetPort: 80 } ]

---
apiVersion: apps/v1
kind: Deployment
metadata: { name: nginx-proxy }
spec:
  selector: { matchLabels: { app: nginx-proxy } }
  template:
    metadata: { labels: { app: nginx-proxy } }
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        - containerPort: 81
        - containerPort: 82
        - containerPort: 83
        - containerPort: 84
        - containerPort: 85
        - containerPort: 87
        - containerPort: 88
        volumeMounts:
        - name: nginx-config-vol
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: nginx-config-vol
        configMap: { name: nginx-config } # Remember to create this configmap first!
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-proxy
  type: LoadBalancer
spec:
  selector: { app: nginx-proxy }
  ports:
  - { name: p8080, port: 8080, targetPort: 80 }
  - { name: p8081, port: 8081, targetPort: 81 }
  - { name: p8082, port: 8082, targetPort: 82 }
  - { name: p8083, port: 8083, targetPort: 83 }
  - { name: p8084, port: 8084, targetPort: 84 }
  - { name: p8086, port: 8086, targetPort: 85 }
  - { name: p8087, port: 8087, targetPort: 87 }
  - { name: p8088, port: 8088, targetPort: 88 }

