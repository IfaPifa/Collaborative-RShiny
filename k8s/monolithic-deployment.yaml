# ==============================================================================
# ShinySwarm — Monolithic Architecture — Kubernetes Deployment
# Target: 8 vCPU / 16 GB RAM (single node, one architecture at a time)
# No Spring Boot, Redis, Kafka — just standalone Shiny apps behind nginx.
#
# Deploy:
#   ./k8s/deploy-monolithic.sh
# Tear down:
#   kubectl delete -f k8s/monolithic-deployment.yaml
#   kubectl delete configmap -l arch=monolithic
# ==============================================================================

# NGINX PROXY
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-proxy
spec:
  selector:
    matchLabels: { app: nginx-proxy }
  template:
    metadata:
      labels: { app: nginx-proxy }
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          volumeMounts:
            - { name: conf, mountPath: /etc/nginx/nginx.conf, subPath: nginx.conf }
          resources:
            requests: { cpu: 50m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
      volumes:
        - name: conf
          configMap: { name: mono-nginx-config }
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-proxy
spec:
  type: NodePort
  selector: { app: nginx-proxy }
  ports:
    - { name: calc, port: 80, targetPort: 80, nodePort: 30080 }
    - { name: analytics, port: 81, targetPort: 81, nodePort: 30081 }
    - { name: adv-analytics, port: 82, targetPort: 82, nodePort: 30082 }
    - { name: csv, port: 83, targetPort: 83, nodePort: 30083 }
    - { name: anomaly, port: 84, targetPort: 84, nodePort: 30084 }
    - { name: map, port: 85, targetPort: 85, nodePort: 30085 }
    - { name: mc, port: 86, targetPort: 86, nodePort: 30086 }
    - { name: ml, port: 87, targetPort: 87, nodePort: 30087 }

# 8 STANDALONE SHINY APPS
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shiny-calculator
spec:
  selector:
    matchLabels: { app: shiny-calculator }
  template:
    metadata:
      labels: { app: shiny-calculator }
    spec:
      containers:
        - name: app
          image: ghcr.io/ifapifa/collaborative-rshiny/monolithic-shiny:latest
          command: ["R", "-e", "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"]
          ports: [{ containerPort: 3838 }]
          volumeMounts:
            - { name: script, mountPath: /app/app.R, subPath: app.r }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
      volumes:
        - name: script
          configMap: { name: mono-app-calculator }
---
apiVersion: v1
kind: Service
metadata:
  name: shiny-calculator
spec:
  selector: { app: shiny-calculator }
  ports: [{ port: 3838 }]
