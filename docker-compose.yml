services:

  # --- REDIS CACHE (The new State Vault) ---
  redis_cache:
    image: redis:alpine
    container_name: redis_cache
    ports:
      - "6379:6379"

  # --- POSTGRES DATABASE ---
  db:
    container_name: postgres_db
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shinyswarm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- JAVA BACKEND ---
  backend:
    container_name: spring_backend
    build: ./shinyswarm
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/shinyswarm
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      APP_JWT_SECRET: IxNDf6ATTN2WPPjo8KnG6pe7wrduNFi3TRTnDWkcZtI=
      SPRING_JPA_HIBERNATE_DDL_AUTO: create 
    depends_on:
      - db
      - redis_cache

  # --- ANGULAR FRONTEND ---
  frontend:
    container_name: angular_frontend
    build: ./angular_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

  # --- RSHINY SERVICES ---
  nginx_proxy:
    container_name: nginx_proxy
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
      - "8081:81"
      - "8082:82"
      - "8083:83"
      - "8084:84"  
      - "8086:85"
      - "8087:87"
      - "8088:88"
    volumes:
      - ./shiny_services/nginx.conf:/etc/nginx/nginx.conf:ro

  # --- APP 1: CALCULATOR ---
  shiny_front:
    build: ./shiny_services  
    container_name: shiny_front
    volumes:
      - ./shiny_services/calculator/shiny_front.r:/app/app.R
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"

  shiny_back:
    build: ./shiny_services  
    container_name: shiny_back
    volumes:
      - ./shiny_services/calculator/shiny_back.r:/app/back.R
    # CHANGED: Now runs as a Plumber API listening on port 8000!
    command: R -e "pr <- plumber::plumb('/app/back.R'); pr$$run(host='0.0.0.0', port=8000)"

  # (Leaving the rest of the apps as they were, just removed the depends_on: kafka lines)
  
  shiny_front_analytics:
    build: ./shiny_services  
    container_name: shiny_front_analytics
    volumes:
      - ./shiny_services/visual_analytics/shiny_front_analytics.r:/app/app.R
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"

  shiny_back_analytics:
    build: ./shiny_services  
    container_name: shiny_back_analytics
    volumes:
      - ./shiny_services/visual_analytics/shiny_back_analytics.r:/app/back.R
    command: Rscript /app/back.R

  shiny_front_csv:
    build: ./shiny_services  
    container_name: shiny_front_csv
    volumes:
      - ./shiny_services/data_exchange/shiny_front_csv.r:/app/app.R
      - shared_data:/app/shared_data
    command: R -e "shiny::runApp('/app/app.R', host='0.0.0.0', port=3838)"

  shiny_back_csv:
    build: ./shiny_services  
    container_name: shiny_back_csv
    volumes:
      - ./shiny_services/data_exchange/shiny_back_csv.r:/app/back.R
