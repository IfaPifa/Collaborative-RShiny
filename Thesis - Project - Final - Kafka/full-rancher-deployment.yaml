# ==========================================
# 8. KEDA AUTOSCALING RULES (Scale to Zero)
# ==========================================
# Requires KEDA installed in Rancher.
# IMPORTANT: The consumerGroup values MUST exactly match the group.id set inside 
# your specific R backend scripts! Adjust them below if necessary.
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata: { name: scaler-calc }
spec:
  scaleTargetRef: { name: shiny-back }
  minReplicaCount: 0
  maxReplicaCount: 5
  triggers:
  - type: kafka
    metadata:
      bootstrapServers: kafka:9092
      consumerGroup: backend_calc_service_v2 # <-- Check shiny_back.r
      topic: input
      lagThreshold: "1"

---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata: { name: scaler-analytics }
spec:
  scaleTargetRef: { name: shiny-back-analytics }
  minReplicaCount: 0
  maxReplicaCount: 5
  triggers:
  - type: kafka
    metadata:
      bootstrapServers: kafka:9092
      consumerGroup: backend_analytics_group # <-- Check shiny_back_analytics.r
      topic: input
      lagThreshold: "1"

---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata: { name: scaler-csv }
spec:
  scaleTargetRef: { name: shiny-back-csv }
  minReplicaCount: 0
  maxReplicaCount: 5
  triggers:
  - type: kafka
    metadata:
      bootstrapServers: kafka:9092
      consumerGroup: backend_csv_group # <-- Check shiny_back_csv.r
      topic: input
      lagThreshold: "1"

---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata: { name: scaler-csv-advanced }
spec:
  scaleTargetRef: { name: shiny-back-csv-advanced }
  minReplicaCount: 0
  maxReplicaCount: 5
  triggers:
  - type: kafka
    metadata:
      bootstrapServers: kafka:9092
      consumerGroup: backend_csv_adv_group # <-- Check shiny_back_csv_advanced.r
      topic: input
      lagThreshold: "1"

---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata: { name: scaler-mc }
spec:
  scaleTargetRef: { name: shiny-back-mc }
  minReplicaCount: 0
  maxReplicaCount: 10 # Allow more workers for heavy MC simulations
  triggers:
  - type: kafka
    metadata:
      bootstrapServers: kafka:9092
      consumerGroup: backend_mc_group # <-- Check shiny_back_mc.r
      topic: input
      lagThreshold: "1"

---
apiVersion: keda.sh/v1alpha1
